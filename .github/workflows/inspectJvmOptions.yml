name: Inspect active JVM options on Nanos (ARM64)

# Runs a JVM *inside* a Nanos unikernel (via ops) and reports which
# hardware-acceleration features it actually uses.
#
#   HotSpot (Temurin / Corretto):
#     1) -Xlog:os+cpu        -> CPU features the guest sees (aes, pmull, sha2, crc32...)
#     2) -XX:+PrintFlagsFinal -> intrinsics the JIT enables (UseAES, UseSHA256Intrinsics...)
#
#   OpenJ9 (Semeru):
#     -XX:+PrintFlagsFinal exists but only prints a small HotSpot-compat subset
#     (no Use*Intrinsics — they don't exist in OpenJ9's JIT). Instead OpenJ9 accelerates
#     crypto via native OpenSSL, on by default (-Djdk.nativeCrypto). We confirm it by
#     EXERCISING crypto (keytool: RSA keygen + SHA) under -Djdk.nativeCryptoTrace=true
#     and reading the trace that proves the OpenSSL natives are loaded/used.

on:
  workflow_dispatch:
    inputs:
      engine:
        description: "Which JVM engine to inspect"
        type: choice
        options: [both, hotspot, openj9]
        default: both
      hotspot_package:
        description: "HotSpot ops package"
        default: "AngeloRubens/TemurinJREarm64Linux:25.0.1"
      openj9_package:
        description: "OpenJ9/Semeru ops package"
        default: "AngeloRubens/SemeruJREarm64Linux:25.0.1"
      arch:
        description: "target arch"
        default: "arm64"

jobs:
  # ================================================================
  # HotSpot: CPU features + intrinsic flags
  # ================================================================
  inspect-hotspot:
    if: ${{ inputs.engine == 'hotspot' || inputs.engine == 'both' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install QEMU and utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system qemu-user qemu-user-static qemu-system-arm qemu-system-aarch64 \
            binfmt-support
          sudo ln -sf "$(which qemu-aarch64-static)" /usr/local/bin/qemu-aarch64

      - name: Install ops
        run: curl https://ops.city/get.sh -sSfL | sh

      - name: Add ops to PATH
        run: echo "$HOME/.ops/bin" >> $GITHUB_PATH

      - name: Check ops version
        run: ops version

      - name: Get package
        run: ops pkg get "${{ inputs.hotspot_package }}" --arch "${{ inputs.arch }}"

      - name: Probe CPU features (-Xlog:os+cpu)
        continue-on-error: true
        run: |
          set -o pipefail
          ops pkg load "${{ inputs.hotspot_package }}" --arch "${{ inputs.arch }}" --nightly \
            -a -Xlog:os+cpu=debug \
            -a -version \
            2>&1 | tee cpu-features.txt

      - name: Dump final VM flags (-XX:+PrintFlagsFinal)
        continue-on-error: true
        run: |
          set -o pipefail
          ops pkg load "${{ inputs.hotspot_package }}" --arch "${{ inputs.arch }}" --nightly \
            -a -XX:+UnlockDiagnosticVMOptions \
            -a -XX:+PrintFlagsFinal \
            -a -version \
            2>&1 | tee flags-final.txt

      - name: Probe VM & system settings (-XshowSettings:all)
        continue-on-error: true
        run: |
          set -o pipefail
          ops pkg load "${{ inputs.hotspot_package }}" --arch "${{ inputs.arch }}" --nightly \
            -a -XshowSettings:all \
            -a -version \
            2>&1 | tee settings.txt

      # Also capture how the VM ergonomically configured itself (selected GC, etc.)
      - name: Probe ergonomic command-line flags (-XX:+PrintCommandLineFlags)
        continue-on-error: true
        run: |
          set -o pipefail
          ops pkg load "${{ inputs.hotspot_package }}" --arch "${{ inputs.arch }}" --nightly \
            -a -XX:+PrintCommandLineFlags \
            -a -version \
            2>&1 | tee cmdline-flags.txt

      - name: Summarize (HotSpot)
        if: always()
        run: |
          # helper: print the named flags from flags-final.txt, sorted, one per line
          show() {
            grep -iE "$1" flags-final.txt 2>/dev/null | sed -E 's/[[:space:]]*\{.*//' | sort || true
          }
          {
            echo "## HotSpot: does the JVM use the hardware fully on Nanos?"
            echo ""
            echo "Package: \`${{ inputs.hotspot_package }}\` (arch \`${{ inputs.arch }}\`)"
            echo ""

            echo "### 1. CPU features the guest exposes to the JVM"
            echo "If this only shows a couple of features (e.g. just \`lse\`), the unikernel is NOT"
            echo "advertising the optional crypto/SIMD extensions via HWCAP, and everything below"
            echo "that depends on them will be off."
            echo '```'
            grep -iE 'features|cpu|cpuinfo' cpu-features.txt 2>/dev/null | head -n 20 || echo "(no CPU line captured)"
            echo '```'

            echo "### 2. Crypto hardware acceleration (needs CPU crypto extensions)"
            echo '```'
            show 'Use(AES|AESCTR|AESIntrinsics|GHASH|SHA|CRC32|CRC32C|CryptoPmull|ChaCha20|Poly1305|MD5|Base64|Adler32|IntPoly|Kyber|Dilithium)Intrinsics?|UseAES\b|UseSHA\b|UseCRC32\b'
            echo '```'

            echo "### 3. ARM baseline instructions & memory ops (independent of HWCAP crypto)"
            echo "DC ZVA cache-line zeroing = UseBlockZeroing; atomics = UseLSE; SIMD/SVE, prefetch, unaligned, spin-wait."
            echo '```'
            show 'UseBlockZeroing|BlockZeroingLowLimit|UseLSE|UseSVE|UseSIMDFor|UseSimpleArrayEquals|UseNeon|UseFMA|UsePopCountInstruction|UseUnalignedAccesses|AvoidUnalignedAccesses|UseCryptoPmullForCRC32|SoftwarePrefetchHintDistance|AllocatePrefetch(Distance|Lines|StepSize|Style|Instr)|OnSpinWaitInst|UseBranchProtection|UseVectorizedHashCodeIntrinsic|UseVectorizedMismatchIntrinsic|MaxVectorSize'
            echo '```'

            echo "### 4. Compiler / runtime ergonomics (did the VM see a real machine?)"
            echo "ActiveProcessorCount / CICompilerCount / selected GC reveal how many CPUs & how much"
            echo "RAM the guest reported. On Nanos a single-vCPU guest often disables tiered/parallel paths."
            echo '```'
            show 'ActiveProcessorCount|CICompilerCount\b|CICompilerCountPerCPU|TieredCompilation\b|TieredStopAtLevel|UseCompiler\b|BackgroundCompilation|ParallelGCThreads|ConcGCThreads|UseSerialGC|UseG1GC|UseParallelGC|UseZGC|UseShenandoahGC|UseNUMA\b|UseContainerSupport|UseTransparentHugePages|UseLargePages\b|MaxHeapSize|InitialHeapSize'
            echo '```'

            echo "### 5. VM & system settings (-XshowSettings:all)"
            echo "Look at available processors, max/free memory, os.arch, os.name, sun.arch.data.model."
            echo '```'
            grep -iE 'processor|memory|heap|os\.|sun\.arch|cpu|available' settings.txt 2>/dev/null | head -n 30 || echo "(no settings captured)"
            echo '```'

            echo "### 6. Ergonomic command-line flags chosen by the VM"
            echo '```'
            head -n 5 cmdline-flags.txt 2>/dev/null || echo "(nothing captured)"
            echo '```'

            echo "### Verdict (crypto)"
            if grep -qiE '^\s*bool\s+UseAES\s+=\s+true' flags-final.txt 2>/dev/null; then
              echo "- ✅ **AES hardware acceleration is ENABLED** — the guest exposes the crypto extensions."
            else
              echo "- ❌ **AES hardware acceleration is DISABLED** (\`UseAES=false\`): AES/SHA/GCM run in software."
              echo "  Root cause is upstream of the JVM: ops/QEMU is not exposing the CPU crypto features to the guest."
            fi
            if grep -qiE '^\s*bool\s+UseBlockZeroing\s+=\s+true' flags-final.txt 2>/dev/null; then
              echo "- ✅ **DC ZVA block zeroing is ENABLED** (\`UseBlockZeroing=true\`) — baseline ARMv8, works even without HWCAP."
            else
              echo "- ⚠️ DC ZVA block zeroing is disabled (\`UseBlockZeroing=false\`): the guest may prohibit DC ZVA (DCZID_EL0.DZP)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HotSpot reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-options-hotspot
          path: |
            cpu-features.txt
            flags-final.txt
            settings.txt
            cmdline-flags.txt
          retention-days: 30

  # ================================================================
  # OpenJ9: native OpenSSL crypto acceleration
  # ================================================================
  inspect-openj9:
    if: ${{ inputs.engine == 'openj9' || inputs.engine == 'both' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install QEMU and utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system qemu-user qemu-user-static qemu-system-arm qemu-system-aarch64 \
            binfmt-support
          sudo ln -sf "$(which qemu-aarch64-static)" /usr/local/bin/qemu-aarch64

      - name: Install ops
        run: curl https://ops.city/get.sh -sSfL | sh

      - name: Add ops to PATH
        run: echo "$HOME/.ops/bin" >> $GITHUB_PATH

      - name: Check ops version
        run: ops version

      - name: Get package
        run: ops pkg get "${{ inputs.openj9_package }}" --arch "${{ inputs.arch }}"

      # 1) List which native-crypto properties OpenJ9 exposes/enables.
      #    OpenJ9's -XX:+PrintFlagsFinal only prints a small HotSpot-compat subset,
      #    but we capture it anyway for reference.
      - name: Dump OpenJ9 PrintFlagsFinal subset (reference)
        continue-on-error: true
        run: |
          set -o pipefail
          ops pkg load "${{ inputs.openj9_package }}" --arch "${{ inputs.arch }}" --nightly \
            -a -XX:+PrintFlagsFinal \
            -a -version \
            2>&1 | tee openj9-flags.txt

      # 2) EXERCISE crypto so the native-crypto trace fires.
      #    We drive keytool via its main class (ships in the JRE): RSA keygen + SHA digest.
      #    -Djdk.nativeCrypto is on by default; -Djdk.nativeCryptoTrace=true prints the proof.
      #    keytool may fail writing the keystore on a read-only unikernel FS, but the crypto
      #    (and its trace) already happened by then -> continue-on-error.
      - name: Probe native OpenSSL crypto (-Djdk.nativeCryptoTrace)
        continue-on-error: true
        run: |
          set -o pipefail
          ops pkg load "${{ inputs.openj9_package }}" --arch "${{ inputs.arch }}" --nightly \
            -a -Djdk.nativeCrypto=true \
            -a -Djdk.nativeCryptoTrace=true \
            -a sun.security.tools.keytool.Main \
            -a -genkeypair -a -alias -a probe \
            -a -keyalg -a RSA -a -keysize -a 2048 \
            -a -sigalg -a SHA256withRSA \
            -a -dname -a CN=probe \
            -a -storepass -a changeit \
            -a -keystore -a /probe.p12 -a -storetype -a PKCS12 \
            2>&1 | tee openj9-nativecrypto.txt

      - name: Summarize (OpenJ9)
        if: always()
        run: |
          {
            echo "## OpenJ9 native-crypto report"
            echo ""
            echo "Package: \`${{ inputs.openj9_package }}\` (arch \`${{ inputs.arch }}\`)"
            echo ""
            echo "### Native OpenSSL crypto trace"
            echo "Lines mentioning OpenSSL / native crypto being loaded or used:"
            echo '```'
            grep -iE 'openssl|native|crypto' openj9-nativecrypto.txt 2>/dev/null | head -n 40 \
              || echo "(no native-crypto trace captured — is native crypto disabled, or did keytool fail before any crypto?)"
            echo '```'
            echo "### PrintFlagsFinal subset (reference)"
            echo '```'
            grep -iE 'native|crypto|Heap' openj9-flags.txt 2>/dev/null | head -n 20 || echo "(nothing captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload OpenJ9 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-options-openj9
          path: |
            openj9-flags.txt
            openj9-nativecrypto.txt
          retention-days: 30
